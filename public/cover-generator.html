<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram WebApp 封面图在线生成器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/admin/lib/lucide.min.js"></script>
</head>
<body class="bg-[#1c1c1d] min-h-screen flex flex-col items-center justify-center p-4">
    <div class="bg-[#2c2c2e] rounded-3xl shadow-2xl p-6 md:p-8 max-w-2xl w-full border border-white/5">
        <div class="text-center mb-6 md:mb-8">
            <h1 class="text-xl md:text-2xl font-bold text-white mb-2 flex items-center justify-center gap-2">
                <i data-lucide="image" class="text-[#3390ec]"></i>
                Telegram WebApp 封面生成器
            </h1>
            <p class="text-[#8e8e93] text-xs md:text-sm">BotFather 要求必须是严格的 640x360 尺寸。<br>您可以直接上传刚刚那张 Logo，我们会自动帮您填色并生成完美尺寸。</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 md:gap-8">
            <!-- 左侧操作区 -->
            <div class="flex flex-col gap-5">
                <div>
                    <label class="block text-sm font-medium text-[#ebebf5] mb-2">1. 上传 Logo</label>
                    <label class="border-2 border-dashed border-[#3390ec]/50 rounded-2xl p-6 flex flex-col items-center justify-center hover:bg-[#3390ec]/10 transition-colors cursor-pointer group">
                        <input type="file" id="imageInput" accept="image/*" class="hidden">
                        <div class="w-12 h-12 rounded-full bg-[#3390ec]/20 flex items-center justify-center mb-3 group-hover:scale-110 transition-transform">
                            <i data-lucide="upload-cloud" class="text-[#3390ec]"></i>
                        </div>
                        <span class="text-sm text-[#3390ec] font-medium" id="uploadText">点击选择图片文件</span>
                    </label>
                </div>

                <div>
                    <label class="block text-sm font-medium text-[#ebebf5] mb-2">2. 选择背景颜色</label>
                    <div class="flex gap-3">
                        <button onclick="setBg('#FFF4EE')" class="w-8 h-8 rounded-full border-2 border-white/20 shadow-sm hover:scale-110 transition-transform" style="background-color: #FFF4EE;"></button>
                        <button onclick="setBg('#000000')" class="w-8 h-8 rounded-full border-2 border-white/20 shadow-sm hover:scale-110 transition-transform" style="background-color: #000000;"></button>
                        <button onclick="setBg('#ffffff')" class="w-8 h-8 rounded-full border-2 border-white/20 shadow-sm hover:scale-110 transition-transform" style="background-color: #ffffff;"></button>
                        <button onclick="setBg('#3390ec')" class="w-8 h-8 rounded-full border-2 border-white/20 shadow-sm hover:scale-110 transition-transform" style="background-color: #3390ec;"></button>
                        <div class="relative w-8 h-8 rounded-full border-2 border-white/20 shadow-sm overflow-hidden flex items-center justify-center bg-[conic-gradient(red,yellow,lime,aqua,blue,fuchsia,red)]">
                            <input type="color" id="bgColorPicker" value="#FFF4EE" class="absolute -inset-4 w-16 h-16 opacity-0 cursor-pointer" oninput="setBg(this.value)">
                        </div>
                    </div>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-[#ebebf5] mb-2 flex justify-between">
                        3. 缩放 Logo
                        <span id="scaleValue" class="text-[#8e8e93]">0.8x</span>
                    </label>
                    <input type="range" id="scaleSlider" min="0.1" max="2" step="0.05" value="0.8" class="w-full accent-[#3390ec]">
                </div>
            </div>

            <!-- 右侧预览区 -->
            <div class="flex flex-col">
                <label class="block text-sm font-medium text-[#ebebf5] mb-2">预览 (严格 640x360)</label>
                
                <div class="w-full aspect-[16/9] border border-white/10 rounded-2xl overflow-hidden shadow-inner bg-[#1c1c1d] flex items-center justify-center mb-6 relative">
                    <canvas id="previewCanvas" width="640" height="360" class="w-full h-full object-contain absolute inset-0 z-10" style="display: none;"></canvas>
                    <div id="placeholder" class="text-[#8e8e93] text-sm flex flex-col items-center gap-2">
                        <i data-lucide="image-off" class="opacity-50"></i>
                        请先在左侧上传 Logo
                    </div>
                </div>
                
                <button id="downloadBtn" disabled class="mt-auto w-full py-3.5 bg-[#3390ec] text-white rounded-xl font-bold flex items-center justify-center gap-2 hover:bg-[#3390ec]/90 disabled:opacity-30 disabled:cursor-not-allowed transition-all shadow-lg active:scale-95">
                    <i data-lucide="download"></i>
                    保存高清原图 (JPG)
                </button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        
        const canvas = document.getElementById('previewCanvas');
        const ctx = canvas.getContext('2d');
        const imageInput = document.getElementById('imageInput');
        const scaleSlider = document.getElementById('scaleSlider');
        const downloadBtn = document.getElementById('downloadBtn');
        const placeholder = document.getElementById('placeholder');
        const uploadText = document.getElementById('uploadText');
        const scaleValue = document.getElementById('scaleValue');
        
        let currentImage = null;
        let currentBg = '#FFF4EE'; // 默认底色匹配那张图的米色

        function setBg(color) {
            currentBg = color;
            drawCanvas();
        }

        imageInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            uploadText.textContent = "已选择: " + file.name.substring(0, 10) + "...";
            
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    currentImage = img;
                    placeholder.style.display = 'none';
                    canvas.style.display = 'block';
                    downloadBtn.disabled = false;
                    drawCanvas();
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(file);
        });

        scaleSlider.addEventListener('input', function() {
            scaleValue.textContent = this.value + 'x';
            drawCanvas();
        });

        function drawCanvas() {
            // Fill background
            ctx.fillStyle = currentBg;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (currentImage) {
                const scale = parseFloat(scaleSlider.value);
                const imgAspect = currentImage.width / currentImage.height;
                const canvasAspect = 640 / 360;
                
                let drawWidth, drawHeight;
                
                if (imgAspect > canvasAspect) {
                    drawWidth = 640 * scale;
                    drawHeight = drawWidth / imgAspect;
                } else {
                    drawHeight = 360 * scale;
                    drawWidth = drawHeight * imgAspect;
                }

                const x = (canvas.width - drawWidth) / 2;
                const y = (canvas.height - drawHeight) / 2;

                ctx.drawImage(currentImage, x, y, drawWidth, drawHeight);
            }
        }

        downloadBtn.addEventListener('click', function() {
            const link = document.createElement('a');
            link.download = 'runtotech_webapp_cover_640x360.jpg';
            link.href = canvas.toDataURL('image/jpeg', 1.0);
            link.click();
        });
        
        // 初始填充背景色
        ctx.fillStyle = currentBg;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    </script>
</body>
</html>
