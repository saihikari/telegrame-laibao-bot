<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>规则引擎可视化配置台</title>
    <!-- 使用 CDN 引入 React, ReactDOM, Babel (开发环境) 和 Tailwind CSS -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide 图标库 (通过 CDN 引入 ES 模块) -->
    <script type="module">
        import * as lucide from 'https://unpkg.com/lucide@latest?module';
        window.lucide = lucide;
    </script>

    <!-- Tailwind 配置 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1E3A8A',
                        secondary: '#00BCD4',
                        background: '#F8FAFC',
                        surface: '#FFFFFF',
                        text: '#1F2937',
                        muted: '#6B7280'
                    },
                    fontFamily: {
                        sans: ['Inter', 'Roboto', 'sans-serif'],
                        mono: ['JetBrains Mono', 'Fira Code', 'monospace']
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #F8FAFC;
            color: #1F2937;
            font-family: 'Inter', 'Roboto', sans-serif;
        }
        /* 自定义滚动条 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #F1F5F9; 
        }
        ::-webkit-scrollbar-thumb {
            background: #CBD5E1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94A3B8; 
        }
        
        .card-shadow {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }
        
        .drag-handle {
            cursor: grab;
        }
        .drag-handle:active {
            cursor: grabbing;
        }
        
        /* 简单的动画过渡 */
        .transition-all {
            transition-property: all;
            transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
            transition-duration: 150ms;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- React 应用程序主体 -->
    <script type="text/babel" data-type="module">
        const { useState, useEffect, useRef, useCallback } = React;

        // --- 组件库 ---
        
        // 图标组件封装
        const Icon = ({ name, size = 20, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && window.lucide.createIcons) {
                    window.lucide.createIcons({
                        icons: { [name]: window.lucide.icons[name] },
                        nameAttr: 'data-lucide',
                        attrs: {
                            class: className,
                            width: size,
                            height: size,
                        }
                    });
                }
            }, [name, className, size]);
            return <i data-lucide={name} className={className}></i>;
        };

        // 标签输入组件
        const TagInput = ({ value = [], onChange, placeholder }) => {
            const [inputValue, setInputValue] = useState('');
            
            const handleKeyDown = (e) => {
                if (e.key === 'Enter' || e.key === ',') {
                    e.preventDefault();
                    const trimmed = inputValue.trim();
                    if (trimmed && !value.includes(trimmed)) {
                        onChange([...value, trimmed]);
                    }
                    setInputValue('');
                } else if (e.key === 'Backspace' && !inputValue && value.length > 0) {
                    onChange(value.slice(0, -1));
                }
            };

            const removeTag = (indexToRemove) => {
                onChange(value.filter((_, index) => index !== indexToRemove));
            };

            return (
                <div className="flex flex-wrap gap-2 p-2 border rounded-md border-gray-300 focus-within:border-secondary focus-within:ring-1 focus-within:ring-secondary bg-white min-h-[42px] items-center">
                    {value.map((tag, index) => (
                        <span key={index} className="flex items-center px-2 py-1 text-sm bg-blue-100 text-primary rounded-md">
                            {tag}
                            <button 
                                type="button"
                                onClick={() => removeTag(index)}
                                className="ml-1 text-blue-400 hover:text-blue-600 focus:outline-none"
                            >
                                &times;
                            </button>
                        </span>
                    ))}
                    <input
                        type="text"
                        value={inputValue}
                        onChange={(e) => setInputValue(e.target.value)}
                        onKeyDown={handleKeyDown}
                        placeholder={value.length === 0 ? placeholder : ''}
                        className="flex-1 outline-none min-w-[120px] text-sm"
                    />
                </div>
            );
        };

        // --- 主应用 ---
        const App = () => {
            const [config, setConfig] = useState({ customers: [] });
            const [loading, setLoading] = useState(true);
            const [saving, setSaving] = useState(false);
            const [activeCustomerIndex, setActiveCustomerIndex] = useState(null);
            
            // 沙盒状态
            const [testText, setTestText] = useState('');
            const [testResult, setTestResult] = useState(null);
            const [testing, setTesting] = useState(false);

            // 获取配置
            const fetchConfig = async () => {
                try {
                    setLoading(true);
                    const res = await fetch('/api/config');
                    if (res.ok) {
                        const data = await res.json();
                        // 确保按优先级排序
                        data.customers.sort((a, b) => (a.priority || 0) - (b.priority || 0));
                        setConfig(data);
                    }
                } catch (error) {
                    console.error('Failed to fetch config:', error);
                    alert('获取配置失败，请检查网络或刷新重试。');
                } finally {
                    setLoading(false);
                }
            };

            useEffect(() => {
                fetchConfig();
            }, []);

            // 保存配置
            const handleSaveConfig = async () => {
                try {
                    setSaving(true);
                    // 保存前重置一下 priority 确保顺序正确
                    const configToSave = {
                        ...config,
                        customers: config.customers.map((c, i) => ({ ...c, priority: i + 1 }))
                    };
                    
                    const res = await fetch('/api/config', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(configToSave)
                    });
                    
                    const data = await res.json();
                    if (data.success) {
                        alert('配置保存成功！');
                        setConfig(configToSave);
                    } else {
                        alert('保存失败！');
                    }
                } catch (error) {
                    console.error('Failed to save config:', error);
                    alert('保存请求出错。');
                } finally {
                    setSaving(false);
                }
            };

            // 沙盒测试
            const handleTest = async () => {
                if (!testText.trim()) return;
                
                try {
                    setTesting(true);
                    const configToTest = {
                        ...config,
                        customers: config.customers.map((c, i) => ({ ...c, priority: i + 1 }))
                    };
                    
                    const res = await fetch('/api/test', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text: testText, config: configToTest })
                    });
                    
                    const data = await res.json();
                    if (data.success) {
                        setTestResult(data.data);
                    } else {
                        setTestResult({ error: data.error });
                    }
                } catch (error) {
                    console.error('Test failed:', error);
                    setTestResult({ error: '请求测试接口失败' });
                } finally {
                    setTesting(false);
                }
            };

            // 客户列表拖拽排序 (简易实现)
            const handleDragStart = (e, index) => {
                e.dataTransfer.setData('draggedIndex', index);
                e.dataTransfer.effectAllowed = 'move';
            };

            const handleDragOver = (e) => {
                e.preventDefault();
                e.dataTransfer.dropEffect = 'move';
            };

            const handleDrop = (e, dropIndex) => {
                e.preventDefault();
                const draggedIndex = parseInt(e.dataTransfer.getData('draggedIndex'), 10);
                if (draggedIndex === dropIndex) return;

                const newCustomers = [...config.customers];
                const [draggedItem] = newCustomers.splice(draggedIndex, 1);
                newCustomers.splice(dropIndex, 0, draggedItem);
                
                // 更新优先级
                newCustomers.forEach((c, i) => { c.priority = i + 1; });
                
                setConfig({ ...config, customers: newCustomers });
                
                // 调整当前激活的索引
                if (activeCustomerIndex === draggedIndex) {
                    setActiveCustomerIndex(dropIndex);
                } else if (
                    (activeCustomerIndex > draggedIndex && activeCustomerIndex <= dropIndex)
                ) {
                    setActiveCustomerIndex(activeCustomerIndex - 1);
                } else if (
                    (activeCustomerIndex < draggedIndex && activeCustomerIndex >= dropIndex)
                ) {
                    setActiveCustomerIndex(activeCustomerIndex + 1);
                }
            };

            // 客户操作
            const addCustomer = () => {
                const newCustomer = {
                    name: `New Customer ${config.customers.length + 1}`,
                    match_keywords: [],
                    priority: config.customers.length + 1,
                    exclude_keywords: [],
                    rules: {
                        "客户": { type: "constant", value: "CustomerName" },
                        "编号": { type: "regex", pattern: "", transform: "" },
                        "应用名称": { type: "keyword_line", keyword: "应用名称", strip_chars: "：:" },
                        "APP链接": { type: "url" },
                        "TT识别码": { type: "keyword_line", keyword: "识别码", strip_chars: "：:" },
                        "媒体类型": { type: "constant", value: "GG" }
                    }
                };
                setConfig({
                    ...config,
                    customers: [...config.customers, newCustomer]
                });
                setActiveCustomerIndex(config.customers.length);
            };

            const deleteCustomer = (index, e) => {
                e.stopPropagation();
                if (!confirm('确定要删除这个客户配置吗？')) return;
                
                const newCustomers = config.customers.filter((_, i) => i !== index);
                setConfig({ ...config, customers: newCustomers });
                if (activeCustomerIndex === index) {
                    setActiveCustomerIndex(null);
                } else if (activeCustomerIndex > index) {
                    setActiveCustomerIndex(activeCustomerIndex - 1);
                }
            };

            // 更新当前编辑的客户
            const updateActiveCustomer = (updates) => {
                if (activeCustomerIndex === null) return;
                const newCustomers = [...config.customers];
                newCustomers[activeCustomerIndex] = { ...newCustomers[activeCustomerIndex], ...updates };
                setConfig({ ...config, customers: newCustomers });
            };

            // 规则操作
            const updateRule = (fieldName, ruleUpdates) => {
                if (activeCustomerIndex === null) return;
                const customer = config.customers[activeCustomerIndex];
                const newRules = { ...customer.rules };
                newRules[fieldName] = { ...newRules[fieldName], ...ruleUpdates };
                updateActiveCustomer({ rules: newRules });
            };

            const addRuleField = () => {
                const fieldName = prompt('输入新的提取字段名称（例如：时区）：');
                if (!fieldName || !fieldName.trim()) return;
                
                const customer = config.customers[activeCustomerIndex];
                if (customer.rules[fieldName]) {
                    alert('该字段已存在！');
                    return;
                }
                
                const newRules = { ...customer.rules };
                newRules[fieldName] = { type: 'constant', value: '' };
                updateActiveCustomer({ rules: newRules });
            };

            const deleteRuleField = (fieldName) => {
                if (!confirm(`确定要删除字段 [${fieldName}] 的提取规则吗？`)) return;
                const customer = config.customers[activeCustomerIndex];
                const newRules = { ...customer.rules };
                delete newRules[fieldName];
                updateActiveCustomer({ rules: newRules });
            };

            if (loading) {
                return <div className="flex items-center justify-center h-screen"><div className="text-xl text-primary font-semibold">加载配置中...</div></div>;
            }

            const activeCustomer = activeCustomerIndex !== null ? config.customers[activeCustomerIndex] : null;

            return (
                <div className="flex h-screen overflow-hidden bg-background">
                    {/* 左侧：导航/全局操作 */}
                    <div className="w-16 bg-primary text-white flex flex-col items-center py-6 shrink-0">
                        <div className="w-10 h-10 bg-secondary rounded-xl flex items-center justify-center mb-8 font-bold text-xl shadow-lg">
                            R
                        </div>
                        <button 
                            onClick={handleSaveConfig} 
                            disabled={saving}
                            className="p-3 rounded-xl hover:bg-white/10 transition-colors mb-4 relative group"
                            title="保存并应用配置"
                        >
                            <Icon name="save" size={24} />
                            {saving && <span className="absolute top-0 right-0 w-2 h-2 bg-green-400 rounded-full animate-ping"></span>}
                        </button>
                        <a href="/admin/status" className="p-3 rounded-xl hover:bg-white/10 transition-colors mb-4 text-white" title="状态监控">
                            <Icon name="activity" size={24} />
                        </a>
                        <a href="/admin/config" className="p-3 rounded-xl hover:bg-white/10 transition-colors mb-4 text-white" title="高级 JSON 模式">
                            <Icon name="code" size={24} />
                        </a>
                    </div>

                    {/* 中左侧：客户列表 */}
                    <div className="w-80 bg-white border-r border-gray-200 flex flex-col shrink-0">
                        <div className="p-4 border-b border-gray-200 flex justify-between items-center bg-gray-50/50">
                            <h2 className="font-semibold text-gray-800 flex items-center gap-2">
                                <Icon name="users" size={18} className="text-primary" />
                                客户路由 ({config.customers.length})
                            </h2>
                            <button 
                                onClick={addCustomer}
                                className="p-1.5 bg-secondary text-white rounded-md hover:bg-secondary/90 transition-colors"
                                title="添加新客户"
                            >
                                <Icon name="plus" size={16} />
                            </button>
                        </div>
                        
                        <div className="flex-1 overflow-y-auto p-3 space-y-3">
                            {config.customers.map((c, index) => (
                                <div 
                                    key={`${c.name}-${index}`}
                                    draggable
                                    onDragStart={(e) => handleDragStart(e, index)}
                                    onDragOver={handleDragOver}
                                    onDrop={(e) => handleDrop(e, index)}
                                    onClick={() => setActiveCustomerIndex(index)}
                                    className={`
                                        p-3 rounded-lg border-2 cursor-pointer transition-all relative group card-shadow
                                        ${activeCustomerIndex === index ? 'border-secondary bg-cyan-50/30' : 'border-transparent bg-white hover:border-gray-200'}
                                    `}
                                >
                                    <div className="absolute left-2 top-1/2 -translate-y-1/2 text-gray-300 opacity-0 group-hover:opacity-100 drag-handle">
                                        <Icon name="grip-vertical" size={16} />
                                    </div>
                                    <div className="pl-6">
                                        <div className="flex justify-between items-start mb-2">
                                            <h3 className="font-semibold text-gray-800 truncate pr-4">{c.name}</h3>
                                            <span className="text-xs bg-gray-100 text-gray-500 px-1.5 py-0.5 rounded font-mono shrink-0">#{index + 1}</span>
                                        </div>
                                        <div className="flex flex-wrap gap-1">
                                            {c.match_keywords?.slice(0, 3).map((kw, i) => (
                                                <span key={i} className="text-[10px] px-1.5 py-0.5 bg-blue-100 text-primary rounded truncate max-w-[80px]">
                                                    {kw}
                                                </span>
                                            ))}
                                            {c.match_keywords?.length > 3 && (
                                                <span className="text-[10px] px-1.5 py-0.5 bg-gray-100 text-gray-500 rounded">+{c.match_keywords.length - 3}</span>
                                            )}
                                        </div>
                                    </div>
                                    <button 
                                        onClick={(e) => deleteCustomer(index, e)}
                                        className="absolute right-2 top-2 p-1 text-gray-400 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity"
                                    >
                                        <Icon name="trash-2" size={14} />
                                    </button>
                                </div>
                            ))}
                            {config.customers.length === 0 && (
                                <div className="text-center py-10 text-gray-400 text-sm">
                                    暂无客户配置，点击右上角添加。
                                </div>
                            )}
                        </div>
                    </div>

                    {/* 中右侧：配置表单 */}
                    <div className="flex-1 bg-background flex flex-col min-w-0">
                        {activeCustomer ? (
                            <div className="flex-1 overflow-y-auto p-6 lg:p-8">
                                <div className="max-w-4xl mx-auto">
                                    <div className="mb-6 pb-4 border-b border-gray-200">
                                        <h1 className="text-2xl font-bold text-gray-900">编辑客户配置</h1>
                                        <p className="text-sm text-gray-500 mt-1">优先级: {activeCustomer.priority} (通过左侧拖拽调整)</p>
                                    </div>

                                    {/* 基础设置 */}
                                    <div className="bg-white rounded-xl card-shadow p-6 mb-6">
                                        <h2 className="text-lg font-semibold text-gray-800 mb-4 flex items-center gap-2">
                                            <Icon name="settings" size={18} className="text-primary" /> 
                                            基础设置
                                        </h2>
                                        <div className="space-y-4">
                                            <div>
                                                <label className="block text-sm font-medium text-gray-700 mb-1">客户名称 (需与 Sheets 底部表名严格一致)</label>
                                                <input 
                                                    type="text" 
                                                    value={activeCustomer.name} 
                                                    onChange={(e) => updateActiveCustomer({ name: e.target.value })}
                                                    className="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-secondary focus:border-secondary"
                                                />
                                            </div>
                                            <div>
                                                <label className="block text-sm font-medium text-gray-700 mb-1">匹配关键词 (包含任意一个即命中，Enter 键添加)</label>
                                                <TagInput 
                                                    value={activeCustomer.match_keywords || []} 
                                                    onChange={(tags) => updateActiveCustomer({ match_keywords: tags })}
                                                    placeholder="输入关键词后按回车..."
                                                />
                                            </div>
                                            <div>
                                                <label className="block text-sm font-medium text-gray-700 mb-1">排除关键词 (包含任意一个则跳过，优先级高于匹配)</label>
                                                <TagInput 
                                                    value={activeCustomer.exclude_keywords || []} 
                                                    onChange={(tags) => updateActiveCustomer({ exclude_keywords: tags })}
                                                    placeholder="可选：输入需排除的词..."
                                                />
                                            </div>
                                        </div>
                                    </div>

                                    {/* 字段提取规则 */}
                                    <div className="bg-white rounded-xl card-shadow p-6 mb-8">
                                        <div className="flex justify-between items-center mb-4 pb-2 border-b border-gray-100">
                                            <h2 className="text-lg font-semibold text-gray-800 flex items-center gap-2">
                                                <Icon name="file-json" size={18} className="text-primary" /> 
                                                字段提取规则
                                            </h2>
                                            <button 
                                                onClick={addRuleField}
                                                className="flex items-center gap-1 px-3 py-1.5 text-sm bg-primary/10 text-primary hover:bg-primary/20 rounded-md transition-colors font-medium"
                                            >
                                                <Icon name="plus" size={16} /> 添加字段
                                            </button>
                                        </div>
                                        
                                        <div className="space-y-4">
                                            {Object.entries(activeCustomer.rules || {}).map(([field, rule]) => (
                                                <div key={field} className="border border-gray-200 rounded-lg p-4 bg-gray-50/50 hover:border-gray-300 transition-colors relative group">
                                                    <button 
                                                        onClick={() => deleteRuleField(field)}
                                                        className="absolute right-3 top-3 p-1.5 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-md transition-colors"
                                                        title="删除字段"
                                                    >
                                                        <Icon name="trash-2" size={16} />
                                                    </button>
                                                    
                                                    <div className="grid grid-cols-1 md:grid-cols-4 gap-4 pr-8">
                                                        <div className="md:col-span-1">
                                                            <label className="block text-xs font-semibold text-gray-500 mb-1 uppercase tracking-wider">输出字段名</label>
                                                            <div className="font-mono text-sm bg-white px-3 py-2 rounded border border-gray-200 text-gray-800">{field}</div>
                                                        </div>
                                                        
                                                        <div className="md:col-span-1">
                                                            <label className="block text-xs font-semibold text-gray-500 mb-1 uppercase tracking-wider">提取类型</label>
                                                            <select 
                                                                value={rule.type}
                                                                onChange={(e) => updateRule(field, { type: e.target.value })}
                                                                className="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-1 focus:ring-secondary focus:border-secondary bg-white text-sm"
                                                            >
                                                                <option value="constant">写死常量 (Constant)</option>
                                                                <option value="keyword_line">同行提取 (Keyword Line)</option>
                                                                <option value="regex">正则表达式 (Regex)</option>
                                                                <option value="url">抓取链接 (URL)</option>
                                                            </select>
                                                        </div>

                                                        <div className="md:col-span-2">
                                                            {rule.type === 'constant' && (
                                                                <div>
                                                                    <label className="block text-xs font-semibold text-gray-500 mb-1 uppercase tracking-wider">固定值</label>
                                                                    <input 
                                                                        type="text" 
                                                                        value={rule.value || ''} 
                                                                        onChange={(e) => updateRule(field, { value: e.target.value })}
                                                                        className="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-1 focus:ring-secondary focus:border-secondary text-sm"
                                                                        placeholder="例如：GG 或 客户A"
                                                                    />
                                                                </div>
                                                            )}
                                                            
                                                            {rule.type === 'url' && (
                                                                <div className="flex items-center h-full pt-4">
                                                                    <span className="text-sm text-gray-500 bg-white px-3 py-1.5 rounded border border-dashed border-gray-300">
                                                                        系统自动抓取文本中的第一个 http/https 链接
                                                                    </span>
                                                                </div>
                                                            )}

                                                            {rule.type === 'keyword_line' && (
                                                                <div className="grid grid-cols-2 gap-2">
                                                                    <div>
                                                                        <label className="block text-xs font-semibold text-gray-500 mb-1 uppercase tracking-wider">行内关键词</label>
                                                                        <input 
                                                                            type="text" 
                                                                            value={rule.keyword || ''} 
                                                                            onChange={(e) => updateRule(field, { keyword: e.target.value })}
                                                                            className="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-1 focus:ring-secondary focus:border-secondary text-sm"
                                                                            placeholder="例如：应用名称"
                                                                        />
                                                                    </div>
                                                                    <div>
                                                                        <label className="block text-xs font-semibold text-gray-500 mb-1 uppercase tracking-wider">去除字符 (可选)</label>
                                                                        <input 
                                                                            type="text" 
                                                                            value={rule.strip_chars || ''} 
                                                                            onChange={(e) => updateRule(field, { strip_chars: e.target.value })}
                                                                            className="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-1 focus:ring-secondary focus:border-secondary text-sm font-mono"
                                                                            placeholder="例如：：: "
                                                                        />
                                                                    </div>
                                                                </div>
                                                            )}

                                                            {rule.type === 'regex' && (
                                                                <div className="grid grid-cols-2 gap-2">
                                                                    <div>
                                                                        <label className="block text-xs font-semibold text-gray-500 mb-1 uppercase tracking-wider">匹配模式 (Pattern)</label>
                                                                        <input 
                                                                            type="text" 
                                                                            value={rule.pattern || ''} 
                                                                            onChange={(e) => updateRule(field, { pattern: e.target.value })}
                                                                            className="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-1 focus:ring-secondary focus:border-secondary text-sm font-mono text-primary"
                                                                            placeholder="例如：pak\\d+-([^\\s]+)"
                                                                        />
                                                                    </div>
                                                                    <div>
                                                                        <label className="block text-xs font-semibold text-gray-500 mb-1 uppercase tracking-wider">转换规则 (Transform)</label>
                                                                        <input 
                                                                            type="text" 
                                                                            value={rule.transform || ''} 
                                                                            onChange={(e) => updateRule(field, { transform: e.target.value })}
                                                                            className="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-1 focus:ring-secondary focus:border-secondary text-sm font-mono text-secondary"
                                                                            placeholder="例如：toUpperCase 或 APK$1"
                                                                        />
                                                                    </div>
                                                                </div>
                                                            )}
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                            
                                            {Object.keys(activeCustomer.rules || {}).length === 0 && (
                                                <div className="text-center py-6 text-gray-400 text-sm border-2 border-dashed border-gray-200 rounded-lg">
                                                    还没有配置任何提取规则，点击右上角添加。
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="flex-1 flex flex-col items-center justify-center text-gray-400 bg-gray-50/30">
                                <Icon name="mouse-pointer-click" size={48} className="mb-4 text-gray-300" />
                                <p className="text-lg">请在左侧选择一个客户进行配置</p>
                            </div>
                        )}
                    </div>

                    {/* 右侧：沙盒测试区 */}
                    <div className="w-96 bg-white border-l border-gray-200 flex flex-col shrink-0">
                        <div className="p-4 border-b border-gray-200 flex justify-between items-center bg-gray-50/50">
                            <h2 className="font-semibold text-gray-800 flex items-center gap-2">
                                <Icon name="play-circle" size={18} className="text-secondary" />
                                实时沙盒测试
                            </h2>
                            <button 
                                onClick={handleTest}
                                disabled={testing || !testText.trim()}
                                className="px-4 py-1.5 bg-primary text-white text-sm rounded-md hover:bg-primary/90 transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-1"
                            >
                                {testing ? <Icon name="loader" size={14} className="animate-spin" /> : <Icon name="zap" size={14} />}
                                测试
                            </button>
                        </div>
                        
                        <div className="flex-1 flex flex-col">
                            <div className="p-4 flex-1 flex flex-col border-b border-gray-100">
                                <label className="block text-xs font-semibold text-gray-500 mb-2 uppercase tracking-wider">输入群内原始文案</label>
                                <textarea
                                    value={testText}
                                    onChange={(e) => setTestText(e.target.value)}
                                    placeholder="在此粘贴群里收到的发包信息..."
                                    className="flex-1 w-full p-3 border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-secondary focus:border-secondary resize-none text-sm font-mono"
                                ></textarea>
                            </div>
                            
                            <div className="p-4 flex-1 flex flex-col bg-gray-50">
                                <label className="block text-xs font-semibold text-gray-500 mb-2 uppercase tracking-wider">清洗解析结果</label>
                                <div className="flex-1 w-full bg-[#1E1E1E] rounded-md overflow-auto p-3 shadow-inner">
                                    {testResult ? (
                                        <pre className="text-xs font-mono text-[#D4D4D4] whitespace-pre-wrap break-all">
                                            {JSON.stringify(testResult, null, 2)}
                                        </pre>
                                    ) : (
                                        <div className="h-full flex items-center justify-center text-gray-500 text-sm">
                                            输入文本并点击测试查看结果
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
