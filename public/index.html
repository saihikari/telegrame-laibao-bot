<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>规则引擎综合管理后台</title>
    <!-- 使用 CDN 引入 React, ReactDOM, Babel (开发环境) 和 Tailwind CSS -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide 图标库 (通过 CDN 引入 ES 模块) -->
    <script type="module">
        import * as lucide from 'https://unpkg.com/lucide@latest?module';
        window.lucide = lucide;
    </script>

    <!-- Tailwind 配置 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1E3A8A',
                        secondary: '#00BCD4',
                        background: '#F8FAFC',
                        surface: '#FFFFFF',
                        text: '#1F2937',
                        muted: '#6B7280'
                    },
                    fontFamily: {
                        sans: ['Inter', 'Roboto', 'sans-serif'],
                        mono: ['JetBrains Mono', 'Fira Code', 'monospace']
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #F8FAFC;
            color: #1F2937;
            font-family: 'Inter', 'Roboto', sans-serif;
            margin: 0;
            overflow: hidden;
        }
        /* 自定义滚动条 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #F1F5F9; 
        }
        ::-webkit-scrollbar-thumb {
            background: #CBD5E1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94A3B8; 
        }
        
        .card-shadow {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }
        
        .drag-handle {
            cursor: grab;
        }
        .drag-handle:active {
            cursor: grabbing;
        }
        
        /* 简单的动画过渡 */
        .transition-all {
            transition-property: all;
            transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
            transition-duration: 150ms;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- React 应用程序主体 -->
    <script type="text/babel" data-type="module">
        const { useState, useEffect, useRef, useCallback } = React;
        const redirectToLogin = () => { window.location.href = '/admin/login'; };

        // --- 组件库 ---
        const Icon = ({ name, size = 20, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && window.lucide.createIcons) {
                    window.lucide.createIcons({
                        icons: { [name]: window.lucide.icons[name] },
                        nameAttr: 'data-lucide',
                        attrs: {
                            class: className,
                            width: size,
                            height: size,
                        }
                    });
                }
            }, [name, className, size]);
            return <i data-lucide={name} className={className}></i>;
        };

        const TagInput = ({ value = [], onChange, placeholder }) => {
            const [inputValue, setInputValue] = useState('');
            
            const handleKeyDown = (e) => {
                if (e.key === 'Enter' || e.key === ',') {
                    e.preventDefault();
                    const trimmed = inputValue.trim();
                    if (trimmed && !value.includes(trimmed)) {
                        onChange([...value, trimmed]);
                    }
                    setInputValue('');
                } else if (e.key === 'Backspace' && !inputValue && value.length > 0) {
                    onChange(value.slice(0, -1));
                }
            };

            const removeTag = (indexToRemove) => {
                onChange(value.filter((_, index) => index !== indexToRemove));
            };

            return (
                <div className="flex flex-wrap gap-2 p-2 border rounded-md border-gray-300 focus-within:border-secondary focus-within:ring-1 focus-within:ring-secondary bg-white min-h-[42px] items-center">
                    {value.map((tag, index) => (
                        <span key={index} className="flex items-center px-2 py-1 text-sm bg-blue-100 text-primary rounded-md">
                            {tag}
                            <button 
                                type="button"
                                onClick={() => removeTag(index)}
                                className="ml-1 text-blue-400 hover:text-blue-600 focus:outline-none"
                            >
                                &times;
                            </button>
                        </span>
                    ))}
                    <input
                        type="text"
                        value={inputValue}
                        onChange={(e) => setInputValue(e.target.value)}
                        onKeyDown={handleKeyDown}
                        placeholder={value.length === 0 ? placeholder : ''}
                        className="flex-1 outline-none min-w-[120px] text-sm"
                    />
                </div>
            );
        };

        // --- 页面组件: 可视化配置 ---
        const VisualConfig = ({ config, setConfig, loading, handleSaveConfig, saving }) => {
            const [activeCustomerIndex, setActiveCustomerIndex] = useState(null);
            const [testText, setTestText] = useState('');
            const [testResult, setTestResult] = useState(null);
            const [testing, setTesting] = useState(false);

            const handleTest = async () => {
                if (!testText.trim()) return;
                try {
                    setTesting(true);
                    const configToTest = {
                        ...config,
                        customers: config.customers.map((c, i) => ({ ...c, priority: i + 1 }))
                    };
                    const res = await fetch('/api/test', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text: testText, config: configToTest })
                    });
                    if (res.status === 401) {
                        redirectToLogin();
                        return;
                    }
                    const data = await res.json();
                    if (data.success) {
                        setTestResult(data.data);
                    } else {
                        setTestResult({ error: data.error });
                    }
                } catch (error) {
                    console.error('Test failed:', error);
                    setTestResult({ error: '请求测试接口失败' });
                } finally {
                    setTesting(false);
                }
            };

            const handleDragStart = (e, index) => {
                e.dataTransfer.setData('draggedIndex', index);
                e.dataTransfer.effectAllowed = 'move';
            };

            const handleDragOver = (e) => {
                e.preventDefault();
                e.dataTransfer.dropEffect = 'move';
            };

            const handleDrop = (e, dropIndex) => {
                e.preventDefault();
                const draggedIndex = parseInt(e.dataTransfer.getData('draggedIndex'), 10);
                if (draggedIndex === dropIndex) return;

                const newCustomers = [...config.customers];
                const [draggedItem] = newCustomers.splice(draggedIndex, 1);
                newCustomers.splice(dropIndex, 0, draggedItem);
                newCustomers.forEach((c, i) => { c.priority = i + 1; });
                setConfig({ ...config, customers: newCustomers });
                
                if (activeCustomerIndex === draggedIndex) {
                    setActiveCustomerIndex(dropIndex);
                } else if ((activeCustomerIndex > draggedIndex && activeCustomerIndex <= dropIndex)) {
                    setActiveCustomerIndex(activeCustomerIndex - 1);
                } else if ((activeCustomerIndex < draggedIndex && activeCustomerIndex >= dropIndex)) {
                    setActiveCustomerIndex(activeCustomerIndex + 1);
                }
            };

            const addCustomer = () => {
                const newCustomer = {
                    name: `New Customer ${config.customers.length + 1}`,
                    match_keywords: [],
                    priority: config.customers.length + 1,
                    exclude_keywords: [],
                    rules: {
                        "客户": { type: "constant", value: "CustomerName" },
                        "编号": { type: "regex", pattern: "", transform: "" },
                        "应用名称": { type: "keyword_line", keyword: "应用名称", strip_chars: "：:" },
                        "APP链接": { type: "url" },
                        "TT识别码": { type: "keyword_line", keyword: "识别码", strip_chars: "：:" },
                        "媒体类型": { type: "constant", value: "GG" }
                    }
                };
                setConfig({
                    ...config,
                    customers: [...config.customers, newCustomer]
                });
                setActiveCustomerIndex(config.customers.length);
            };

            const duplicateCustomer = (index, e) => {
                e.stopPropagation();
                const customerToCopy = config.customers[index];
                const copiedRules = JSON.parse(JSON.stringify(customerToCopy.rules || {}));
                const newCustomer = {
                    ...customerToCopy,
                    name: `${customerToCopy.name} (副本)`,
                    priority: config.customers.length + 1,
                    rules: copiedRules
                };
                setConfig({
                    ...config,
                    customers: [...config.customers, newCustomer]
                });
                setActiveCustomerIndex(config.customers.length);
            };

            const deleteCustomer = (index, e) => {
                e.stopPropagation();
                if (!confirm('确定要删除这个客户配置吗？')) return;
                const newCustomers = config.customers.filter((_, i) => i !== index);
                setConfig({ ...config, customers: newCustomers });
                if (activeCustomerIndex === index) {
                    setActiveCustomerIndex(null);
                } else if (activeCustomerIndex > index) {
                    setActiveCustomerIndex(activeCustomerIndex - 1);
                }
            };

            const updateActiveCustomer = (updates) => {
                if (activeCustomerIndex === null) return;
                const newCustomers = [...config.customers];
                newCustomers[activeCustomerIndex] = { ...newCustomers[activeCustomerIndex], ...updates };
                setConfig({ ...config, customers: newCustomers });
            };

            const updateRule = (fieldName, ruleUpdates) => {
                if (activeCustomerIndex === null) return;
                const customer = config.customers[activeCustomerIndex];
                const newRules = { ...customer.rules };
                newRules[fieldName] = { ...newRules[fieldName], ...ruleUpdates };
                updateActiveCustomer({ rules: newRules });
            };

            const addRuleField = () => {
                const fieldName = prompt('输入新的提取字段名称（例如：时区）：');
                if (!fieldName || !fieldName.trim()) return;
                const customer = config.customers[activeCustomerIndex];
                if (customer.rules[fieldName]) {
                    alert('该字段已存在！');
                    return;
                }
                const newRules = { ...customer.rules };
                newRules[fieldName] = { type: 'constant', value: '' };
                updateActiveCustomer({ rules: newRules });
            };

            const deleteRuleField = (fieldName) => {
                if (!confirm(`确定要删除字段 [${fieldName}] 的提取规则吗？`)) return;
                const customer = config.customers[activeCustomerIndex];
                const newRules = { ...customer.rules };
                delete newRules[fieldName];
                updateActiveCustomer({ rules: newRules });
            };

            if (loading) return <div className="flex items-center justify-center h-full"><div className="text-xl text-primary font-semibold">加载配置中...</div></div>;

            const activeCustomer = activeCustomerIndex !== null ? config.customers[activeCustomerIndex] : null;

            return (
                <div className="block md:flex md:flex-row h-full w-full overflow-y-auto md:overflow-hidden">
                    {/* 中左侧：客户列表 */}
                    <div className="w-full md:w-80 bg-white border-b md:border-r border-gray-200 flex flex-col h-auto md:h-full shrink-0">
                        <div className="p-3 md:p-4 border-b border-gray-200 flex justify-between items-center bg-gray-50/50">
                            <h2 className="font-semibold text-gray-800 flex items-center gap-2 text-sm md:text-base">
                                <Icon name="users" size={16} className="text-primary md:w-[18px] md:h-[18px]" />
                                客户路由 ({config.customers.length})
                            </h2>
                            <div className="flex items-center gap-1.5 md:gap-2">
                                <button 
                                    onClick={handleSaveConfig}
                                    disabled={saving}
                                    className="px-2 md:px-3 py-1 md:py-1.5 bg-green-500 text-white text-xs md:text-sm rounded-md hover:bg-green-600 transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-1"
                                >
                                    {saving ? <Icon name="loader" size={12} className="animate-spin md:w-[14px] md:h-[14px]" /> : <Icon name="save" size={12} className="md:w-[14px] md:h-[14px]" />}
                                    <span className="hidden md:inline">保存所有客户配置</span>
                                    <span className="inline md:hidden">保存全部</span>
                                </button>
                                <button 
                                    onClick={addCustomer}
                                    className="p-1 md:p-1.5 bg-secondary text-white rounded-md hover:bg-secondary/90 transition-colors"
                                    title="添加新客户配置"
                                >
                                    <Icon name="plus" size={14} className="md:w-[16px] md:h-[16px]" />
                                </button>
                            </div>
                        </div>
                        
                        <div className="flex-none md:flex-1 overflow-y-visible md:overflow-y-auto p-2 md:p-3">
                            <div className="grid grid-cols-4 md:grid-cols-1 gap-2 md:gap-3 md:space-y-0">
                                {config.customers.map((c, index) => (
                                    <div 
                                        key={`${c.name}-${index}`}
                                        draggable
                                        onDragStart={(e) => handleDragStart(e, index)}
                                        onDragOver={handleDragOver}
                                        onDrop={(e) => handleDrop(e, index)}
                                        onClick={() => setActiveCustomerIndex(index)}
                                        className={`
                                            p-1.5 md:p-3 rounded-lg border-2 cursor-pointer transition-all relative group card-shadow flex flex-col justify-center items-center md:items-stretch md:justify-start
                                            ${activeCustomerIndex === index ? 'border-secondary bg-cyan-50/30' : 'border-transparent bg-white hover:border-gray-200'}
                                        `}
                                    >
                                        <div className="hidden md:block absolute left-2 top-1/2 -translate-y-1/2 text-gray-300 opacity-0 group-hover:opacity-100 drag-handle">
                                            <Icon name="grip-vertical" size={16} />
                                        </div>
                                        <div className="md:pl-6 w-full text-center md:text-left">
                                            <div className="flex flex-col md:flex-row justify-center md:justify-between items-center md:items-start mb-1 md:mb-2">
                                                <h3 className="font-semibold text-gray-800 truncate w-full text-xs md:text-base md:pr-4" title={c.name}>{c.name}</h3>
                                                <span className="hidden md:inline-block text-xs bg-gray-100 text-gray-500 px-1.5 py-0.5 rounded font-mono shrink-0">#{index + 1}</span>
                                            </div>
                                            <div className="hidden md:flex flex-wrap gap-1">
                                                {c.match_keywords?.slice(0, 3).map((kw, i) => (
                                                    <span key={i} className="text-[10px] px-1.5 py-0.5 bg-blue-100 text-primary rounded truncate max-w-[80px]">
                                                        {kw}
                                                    </span>
                                                ))}
                                                {c.match_keywords?.length > 3 && (
                                                    <span className="text-[10px] px-1.5 py-0.5 bg-gray-100 text-gray-500 rounded">+{c.match_keywords.length - 3}</span>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    {/* 中右侧：配置表单 */}
                    <div className="w-full md:flex-[2] bg-background flex flex-col min-w-0 md:min-w-[500px] border-b md:border-b-0">
                        {activeCustomer ? (
                            <div className="flex-1 overflow-y-auto p-6 lg:p-8">
                                <div className="max-w-4xl mx-auto">
                                    <div className="mb-4 md:mb-6 pb-3 md:pb-4 border-b border-gray-200 flex flex-col md:flex-row justify-between items-start gap-3 md:gap-0">
                                        <div>
                                            <h1 className="text-xl md:text-2xl font-bold text-gray-900">编辑客户配置</h1>
                                            <p className="text-xs md:text-sm text-gray-500 mt-1">优先级: {activeCustomer.priority} (通过电脑端左侧拖拽调整)</p>
                                        </div>
                                        <div className="flex gap-2 w-full md:w-auto">
                                            <button 
                                                onClick={(e) => duplicateCustomer(activeCustomerIndex, e)}
                                                className="flex-1 md:flex-none justify-center px-2 md:px-3 py-1.5 md:py-1.5 bg-blue-50 text-blue-600 text-xs md:text-sm rounded-md hover:bg-blue-100 transition-colors flex items-center gap-1 border border-blue-200 font-medium whitespace-nowrap"
                                                title="复制当前客户的所有配置"
                                            >
                                                <Icon name="copy" size={14} className="w-[12px] h-[12px] md:w-[14px] md:h-[14px]" /> <span className="hidden md:inline">克隆本客户配置</span><span className="md:hidden">克隆</span>
                                            </button>
                                            <button 
                                                onClick={(e) => deleteCustomer(activeCustomerIndex, e)}
                                                className="flex-1 md:flex-none justify-center px-2 md:px-3 py-1.5 md:py-1.5 bg-red-50 text-red-600 text-xs md:text-sm rounded-md hover:bg-red-100 transition-colors flex items-center gap-1 border border-red-200 font-medium whitespace-nowrap"
                                                title="永久删除当前客户"
                                            >
                                                <Icon name="trash-2" size={14} className="w-[12px] h-[12px] md:w-[14px] md:h-[14px]" /> <span className="hidden md:inline">删除本客户配置</span><span className="md:hidden">删除</span>
                                            </button>
                                        </div>
                                    </div>

                                    {/* 基础设置 */}
                                    <div className="bg-white rounded-xl card-shadow p-4 md:p-6 mb-4 md:mb-6">
                                        <h2 className="text-base md:text-lg font-semibold text-gray-800 mb-3 md:mb-4 flex items-center gap-2">
                                            <Icon name="settings" size={16} className="text-primary md:w-[18px] md:h-[18px]" /> 
                                            基础设置
                                        </h2>
                                        <div className="space-y-3 md:space-y-4">
                                            <div>
                                                <label className="block text-xs md:text-sm font-medium text-gray-700 mb-1">客户名称</label>
                                                <input 
                                                    type="text" 
                                                    value={activeCustomer.name} 
                                                    onChange={(e) => updateActiveCustomer({ name: e.target.value })}
                                                    className="w-full px-2.5 py-1.5 md:px-3 md:py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-secondary focus:border-secondary text-sm"
                                                />
                                            </div>
                                            <div>
                                                <label className="block text-xs md:text-sm font-medium text-gray-700 mb-1">匹配关键词</label>
                                                <TagInput 
                                                    value={activeCustomer.match_keywords || []} 
                                                    onChange={(tags) => updateActiveCustomer({ match_keywords: tags })}
                                                    placeholder="输入词按回车..."
                                                />
                                            </div>
                                            <div>
                                                <label className="block text-xs md:text-sm font-medium text-gray-700 mb-1">排除关键词</label>
                                                <TagInput 
                                                    value={activeCustomer.exclude_keywords || []} 
                                                    onChange={(tags) => updateActiveCustomer({ exclude_keywords: tags })}
                                                    placeholder="可选: 输入需排除的词..."
                                                />
                                            </div>
                                        </div>
                                    </div>

                                    {/* 字段提取规则 */}
                                    <div className="bg-white rounded-xl card-shadow p-4 md:p-6 mb-6 md:mb-8">
                                        <div className="flex justify-between items-center mb-3 md:mb-4 pb-2 border-b border-gray-100">
                                            <h2 className="text-base md:text-lg font-semibold text-gray-800 flex items-center gap-2">
                                                <Icon name="file-json" size={16} className="text-primary md:w-[18px] md:h-[18px]" /> 
                                                字段提取规则
                                            </h2>
                                            <button 
                                                onClick={addRuleField}
                                                className="flex items-center gap-1 px-2 md:px-3 py-1 md:py-1.5 text-xs md:text-sm bg-primary/10 text-primary hover:bg-primary/20 rounded-md transition-colors font-medium"
                                            >
                                                <Icon name="plus" size={14} className="md:w-[16px] md:h-[16px]" /> 添加字段
                                            </button>
                                        </div>
                                        
                                        <div className="space-y-4">
                                            {Object.entries(activeCustomer.rules || {}).map(([field, rule]) => (
                                                <div key={field} className="border border-gray-200 rounded-lg p-4 bg-gray-50/50 hover:border-gray-300 transition-colors relative group">
                                                    <button 
                                                        onClick={() => deleteRuleField(field)}
                                                        className="absolute right-3 top-3 p-1.5 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-md transition-colors"
                                                        title="删除字段"
                                                    >
                                                        <Icon name="trash-2" size={16} />
                                                    </button>
                                                    
                                                    <div className="grid grid-cols-1 md:grid-cols-4 gap-4 pr-8">
                                                        <div className="md:col-span-1">
                                                            <label className="block text-xs font-semibold text-gray-500 mb-1 uppercase tracking-wider">输出字段名</label>
                                                            <div className="font-mono text-sm bg-white px-3 py-2 rounded border border-gray-200 text-gray-800">{field}</div>
                                                        </div>
                                                        
                                                        <div className="md:col-span-1">
                                                            <label className="block text-xs font-semibold text-gray-500 mb-1 uppercase tracking-wider">提取类型</label>
                                                            <select 
                                                                value={rule.type}
                                                                onChange={(e) => updateRule(field, { type: e.target.value })}
                                                                className="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-1 focus:ring-secondary focus:border-secondary bg-white text-sm"
                                                            >
                                                                <option value="constant">写死常量 (Constant)</option>
                                                                <option value="keyword_line">同行提取 (Keyword Line)</option>
                                                                <option value="regex">正则表达式 (Regex)</option>
                                                                <option value="url">抓取链接 (URL)</option>
                                                            </select>
                                                        </div>

                                                        <div className="md:col-span-2">
                                                            {rule.type === 'constant' && (
                                                                <div>
                                                                    <label className="block text-xs font-semibold text-gray-500 mb-1 uppercase tracking-wider">固定值</label>
                                                                    <input 
                                                                        type="text" 
                                                                        value={rule.value || ''} 
                                                                        onChange={(e) => updateRule(field, { value: e.target.value })}
                                                                        className="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-1 focus:ring-secondary focus:border-secondary text-sm"
                                                                    />
                                                                </div>
                                                            )}
                                                            
                                                            {rule.type === 'url' && (
                                                                <div className="flex items-center h-full pt-4">
                                                                    <span className="text-sm text-gray-500 bg-white px-3 py-1.5 rounded border border-dashed border-gray-300">
                                                                        系统自动抓取文本中的第一个 http/https 链接
                                                                    </span>
                                                                </div>
                                                            )}

                                                            {rule.type === 'keyword_line' && (
                                                                <div className="grid grid-cols-2 gap-2">
                                                                    <div>
                                                                        <label className="block text-xs font-semibold text-gray-500 mb-1 uppercase tracking-wider">行内关键词</label>
                                                                        <input 
                                                                            type="text" 
                                                                            value={rule.keyword || ''} 
                                                                            onChange={(e) => updateRule(field, { keyword: e.target.value })}
                                                                            className="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-1 focus:ring-secondary focus:border-secondary text-sm"
                                                                        />
                                                                    </div>
                                                                    <div>
                                                                        <label className="block text-xs font-semibold text-gray-500 mb-1 uppercase tracking-wider">去除字符 (可选)</label>
                                                                        <input 
                                                                            type="text" 
                                                                            value={rule.strip_chars || ''} 
                                                                            onChange={(e) => updateRule(field, { strip_chars: e.target.value })}
                                                                            className="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-1 focus:ring-secondary focus:border-secondary text-sm font-mono"
                                                                        />
                                                                    </div>
                                                                </div>
                                                            )}

                                                            {rule.type === 'regex' && (
                                                                <div className="grid grid-cols-2 gap-2">
                                                                    <div>
                                                                        <label className="block text-xs font-semibold text-gray-500 mb-1 uppercase tracking-wider">匹配模式 (Pattern)</label>
                                                                        <input 
                                                                            type="text" 
                                                                            value={rule.pattern || ''}

                                className={`flex-1 md:w-full py-2 md:py-3 flex flex-col items-center justify-center rounded-lg transition-colors relative group ${activeTab === 'guide' ? 'bg-blue-600/20 text-blue-400' : 'hover:bg-slate-800 hover:text-slate-100'}`}
                            >
                                <Icon name="book-open" size={20} className="mb-1" />
                                <span className="text-[10px] md:text-[11px] font-medium whitespace-nowrap">向导</span>
                            </button>

                            <button 
                                onClick={() => setActiveTab('customize')} 
                                className={`flex-1 md:hidden py-2 flex flex-col items-center justify-center rounded-lg transition-colors relative group ${activeTab === 'customize' ? 'bg-orange-500/20 text-orange-400' : 'hover:bg-slate-800 text-orange-500/70 hover:text-orange-400'}`}
                            >
                                <Icon name="gem" size={20} className="mb-1" />
                                <span className="text-[10px] font-medium whitespace-nowrap">定制</span>
                            </button>
                            
                            <button 
                                onClick={() => { window.location.href = '/admin/logout'; }} 
                                className="flex-1 md:hidden py-2 flex flex-col items-center justify-center rounded-lg transition-colors relative group hover:bg-slate-800 hover:text-slate-100 text-slate-300"
                            >
                                <Icon name="log-out" size={20} className="mb-1" />
                                <span className="text-[10px] font-medium whitespace-nowrap">退出</span>
                            </button>
                        </div>

                        <div className="hidden md:flex mt-auto w-full px-2 flex-col gap-2">
                            <button 
                                onClick={() => setActiveTab('customize')} 
                                className={`w-full py-3 flex flex-col items-center justify-center rounded-lg transition-colors relative group ${activeTab === 'customize' ? 'bg-orange-500/20 text-orange-400' : 'hover:bg-slate-800 text-orange-500/70 hover:text-orange-400'}`}
                            >
                                <Icon name="gem" size={22} className="mb-1" />
                                <span className="text-[11px] font-medium">定制开发</span>
                            </button>
                            <button 
                                onClick={() => { window.location.href = '/admin/logout'; }} 
                                className="w-full py-3 flex flex-col items-center justify-center rounded-lg transition-colors relative group hover:bg-slate-800 hover:text-slate-100 text-slate-300"
                            >
                                <Icon name="log-out" size={22} className="mb-1" />
                                <span className="text-[11px] font-medium">退出</span>
                            </button>
                        </div>
                    </div>

                    {/* 右侧/上方：主内容区 */}
                    <div className="flex-1 flex overflow-hidden">
                        {renderContent()}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Main />);
    </script>
</body>
